<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEI ZIH-YUN | Music Producer Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --shelford-blue: #1D2B44;
            --silk-red: #C8102E;
            --candy-bg: #f4f7f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--candy-bg);
            color: var(--shelford-blue);
            min-height: 100vh;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }

        /* Neve Design - Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(29, 43, 68, 0.05);
            border-radius: 40px; /* Highly rounded corners */
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* Video Container Sizing */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        /* YouTube: 16:9 Aspect Ratio */
        .yt-aspect { padding-bottom: 56.25%; height: 0; }
        
        /* Instagram: Taller to prevent "Twisted" look */
        .ig-aspect { padding-bottom: 125%; height: 0; }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Custom Play Overlay */
        .play-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .play-button-circle {
            width: 65px;
            height: 65px;
            background: var(--silk-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(200, 16, 46, 0.3);
        }

        .play-button-circle svg {
            fill: white;
            width: 25px;
            height: 25px;
            margin-left: 4px;
        }

        /* UI Labels from Screenshot */
        .status-tag {
            background: var(--silk-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 0.75rem;
        }

        .label-red {
            color: var(--silk-red);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .label-value {
            color: var(--shelford-blue);
            font-weight: 700;
            font-size: 0.95rem;
        }

        /* Header Accent Line */
        .accent-line {
            height: 2px;
            width: 40px;
            background: var(--silk-red);
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
            opacity: 0.5;
        }
    </style>
</head>
<body class="p-6 md:p-16">

    <!-- Header Section -->
    <header class="max-w-6xl mx-auto mb-16">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
            <div>
                <h1 class="text-5xl md:text-6xl font-800 font-outfit tracking-tighter flex items-center">
                    WEI<span style="color: var(--silk-red)">ZIH-YUN</span>
                </h1>
                <p class="text-sm md:text-base font-medium opacity-60 mt-2">
                    Mixing + Live Vocal + Playback Engineer ｜ Arranger ｜ Acoustic Guitarist
                </p>
            </div>
            <div class="mt-6 md:mt-0">
                <span class="accent-line"></span>
                <span class="text-xs font-bold tracking-widest uppercase opacity-40">Selected Works 24/25</span>
            </div>
        </div>
    </header>

    <!-- Project Grid -->
    <main id="project-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
        <!-- JS Injected Content -->
    </main>

    <footer class="max-w-6xl mx-auto mt-24 py-10 border-t border-gray-200 text-center opacity-30 text-xs font-bold tracking-widest">
        &copy; <script>document.write(new Date().getFullYear())</script> WEI ZIH-YUN. ALL RIGHTS RESERVED.
    </footer>

    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        /**
         * MANUAL CMS
         */
        const MY_PROJECTS = [
            {
                id: "p1",
                platform: "youtube",
                type: "STUDIO",
                title: "GENBLUE - “Merry & Happy (TWICE)” Cover",
                role: "Recording Engineer",
                artist: "GENBLUE(젠블루)",
                venue: "TEN ENTERTAINMENT",
                videoId: "V4nQFpTLCiE"
            },
            {
                id: "p2",
                platform: "instagram",
                type: "LIVE MIXING",
                title: "GENBLUE - Color Paper (Official Live Video)",
                role: "Mixing Engineer / Vocal Recording Engineer / Concert Executive Music Producer",
                artist: "GENBLUE(젠블루)",
                venue: "Kaohsiung Music Center",
                videoId: "DVOQ2pCiXH7" 
            }
        ];

        const players = {};

        function renderProjects() {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = MY_PROJECTS.map(project => {
                const isYT = project.platform === 'youtube';
                
                return `
                <div class="glass-card p-6 md:p-8 flex flex-col">
                    <div class="video-wrapper ${isYT ? 'yt-aspect' : 'ig-aspect'}">
                        <!-- Custom Overlay -->
                        <div class="play-overlay" id="overlay-${project.id}" onclick="handlePlay('${project.id}', '${project.platform}')">
                            <div class="play-button-circle">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                        
                        <!-- Player -->
                        ${isYT 
                            ? `<div id="player-${project.id}"></div>`
                            : `<iframe id="player-${project.id}" src="https://www.instagram.com/p/${project.videoId}/embed/captioned/" allowtransparency="true" frameborder="0" scrolling="no"></iframe>`
                        }
                    </div>

                    <div class="flex-grow">
                        <span class="status-tag">${project.type}</span>
                        <h3 class="text-2xl font-800 font-outfit leading-tight mb-1">${project.title}</h3>
                        <p class="text-sm opacity-60 font-medium mb-6">${project.role}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-6 border-t border-gray-100">
                        <div>
                            <p class="label-red">Artist</p>
                            <p class="label-value">${project.artist}</p>
                        </div>
                        <div>
                            <p class="label-red">Location / Venue</p>
                            <p class="label-value">${project.venue}</p>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // YouTube API Initializer
        function onYouTubeIframeAPIReady() {
            MY_PROJECTS.forEach(project => {
                if(project.platform === 'youtube') {
                    players[project.id] = new YT.Player(`player-${project.id}`, {
                        videoId: project.videoId,
                        playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0 }
                    });
                }
            });
        }

        /**
         * Playback Handler
         */
        function handlePlay(id, platform) {
            // 1. Hide the overlay immediately
            const overlay = document.getElementById(`overlay-${id}`);
            if (overlay) overlay.style.display = 'none';

            // 2. Start playback if YouTube
            if (platform === 'youtube' && players[id]) {
                players[id].playVideo();
            }
            
            // 3. Instagram Note: Once overlay is gone, user clicks the 
            // native "Play" button inside the Instagram frame.
        }

        window.addEventListener('DOMContentLoaded', renderProjects);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEI ZIH-YUN | Music Producer</title>
    
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Outfit for titles, Inter for body -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --shelford-blue: #1D2B44;
            --silk-red: #C8102E;
            --candy-bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--candy-bg);
            color: var(--shelford-blue);
            background-image: 
                radial-gradient(at 0% 0%, rgba(29, 43, 68, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(200, 16, 46, 0.05) 0px, transparent 50%);
            min-height: 100vh;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }

        /* Neve Design - Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(29, 43, 68, 0.05);
            border-radius: 32px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(200, 16, 46, 0.1);
        }

        /* Video Container Styling */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Play Overlay */
        .play-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: rgba(29, 43, 68, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .play-button {
            width: 70px;
            height: 70px;
            background: var(--silk-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(200, 16, 46, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .play-overlay:hover .play-button {
            transform: scale(1.15);
        }

        .play-button svg {
            fill: white;
            width: 30px;
            height: 30px;
            margin-left: 4px;
        }

        /* Labels */
        .type-tag {
            background: var(--silk-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .detail-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--silk-red);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--shelford-blue);
        }

        /* Smooth Scroll */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <!-- Header Section -->
    <header class="max-w-6xl mx-auto mb-16 flex flex-col md:flex-row justify-between items-end gap-6">
        <div>
            <h1 class="text-4xl md:text-6xl font-800 font-outfit tracking-tighter uppercase">
                Wei <span style="color: var(--silk-red)">Zih-Yun</span>
            </h1>
            <p class="text-lg opacity-60 mt-2 font-medium">Music Producer & Technical Director</p>
        </div>
        <div class="flex gap-4">
            <div class="h-[2px] w-12 bg-[#C8102E] self-center opacity-30"></div>
            <span class="text-xs font-bold tracking-[0.2em] uppercase opacity-40">Selected Works 24/25</span>
        </div>
    </header>

    <!-- Project Grid -->
    <main id="project-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        <!-- Projects injected by JS -->
    </main>

    <footer class="max-w-6xl mx-auto mt-24 pt-12 border-t border-gray-200 text-center opacity-30 text-sm font-bold tracking-widest uppercase">
        &copy; <script>document.write(new Date().getFullYear())</script> WEI ZIH-YUN
    </footer>

    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        /**
         * MANUAL CMS
         * Add your projects here. 
         * The 'youtubeId' is the code after "v=" in a YouTube URL.
         */
        const MY_PROJECTS = [
            {
                id: "work-1",
                title: "GENBLUE(젠블루) - “Merry & Happy (TWICE)” Cover",
                role: "Recording Engineer",
                type: "STUDIO",
                artist: "Neon Architecture",
                venue: "TEN ENTERTAINMENT",
                youtubeId: "V4nQFpTLCiE" 
            },
            {
                id: "work-2",
                title: "Live at the National Arena",
                role: "Playback Engineer",
                type: "LIVE",
                artist: "The Velvet Echoes",
                venue: "Taipei Music Center",
                youtubeId: "3S_fT7VnKUM"
            },
            {
                id: "work-3",
                title: "Modern Solitude",
                role: "Lead Producer",
                type: "STUDIO",
                artist: "Zih-Yun Solo Project",
                venue: "Private Facility",
                youtubeId: "9bZkp7q19f0"
            },
            {
                id: "work-4",
                title: "Cyberpunk World Tour",
                role: "Technical Director",
                type: "LIVE",
                artist: "Aesthete 2077",
                venue: "Various Global Venues",
                youtubeId: "L_jWHffIx5E"
            }
        ];

        // Object to store YouTube Player instances
        const players = {};

        /**
         * Initialize the Gallery
         */
        function renderProjects() {
            const grid = document.getElementById('project-grid');
            
            grid.innerHTML = MY_PROJECTS.map(project => `
                <div class="glass-card p-6 md:p-8">
                    <div class="video-wrapper">
                        <!-- Play Overlay: Disappears on click -->
                        <div class="play-overlay" id="overlay-${project.id}" onclick="initiatePlayback('${project.id}')">
                            <div class="play-button">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                        <!-- YouTube Iframe -->
                        <div id="player-${project.id}"></div>
                    </div>

                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="type-tag">${project.type}</span>
                            <h3 class="text-2xl font-800 font-outfit mt-3 leading-tight">${project.title}</h3>
                            <p class="text-sm font-medium opacity-60 mt-1">${project.role}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-gray-100">
                        <div>
                            <p class="detail-label">Artist</p>
                            <p class="detail-value">${project.artist}</p>
                        </div>
                        <div>
                            <p class="detail-label">Location / Venue</p>
                            <p class="detail-value">${project.venue}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /**
         * YouTube API Callback
         * Automatically called when API script is loaded
         */
        function onYouTubeIframeAPIReady() {
            MY_PROJECTS.forEach(project => {
                players[project.id] = new YT.Player(`player-${project.id}`, {
                    videoId: project.youtubeId,
                    playerVars: {
                        'autoplay': 0,
                        'controls': 1,
                        'modestbranding': 1,
                        'rel': 0,
                        'showinfo': 0
                    },
                    events: {
                        'onReady': onPlayerReady
                    }
                });
            });
        }

        function onPlayerReady(event) {
            // Player is loaded and ready for instructions
        }

        /**
         * Playback Logic
         * Hides the custom overlay and starts the video
         */
        function initiatePlayback(id) {
            const overlay = document.getElementById(`overlay-${id}`);
            if (overlay) {
                overlay.style.display = 'none'; // Completely remove interaction layer
            }
            
            if (players[id] && players[id].playVideo) {
                players[id].playVideo();
            }
        }

        // Run rendering on load
        window.addEventListener('DOMContentLoaded', renderProjects);
    </script>
</body>
</html>

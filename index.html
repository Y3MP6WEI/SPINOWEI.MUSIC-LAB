<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEI ZIH-YUN | Music Producer Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    
    <!-- Forced Korean Font: Pretendard -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <style>
        :root {
            --shelford-blue: #1D2B44;
            --silk-red: #C8102E;
            --candy-bg: #f4f7f9;
        }

        body {
            /* 
               Forced Font Stack:
               1. English: Inter
               2. Korean: Pretendard
               3. Chinese: Taipei Sans TC (Local/System prioritized)
            */
            font-family: 'Inter', 'Pretendard', 'Taipei Sans TC', 'PingFang TC', 'Noto Sans TC', sans-serif;
            background-color: var(--candy-bg);
            color: var(--shelford-blue);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .font-outfit { 
            font-family: 'Outfit', 'Pretendard', 'Taipei Sans TC', sans-serif; 
        }

        /* Neve Design - Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(29, 43, 68, 0.05);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.3s ease;
        }

        .glass-card:hover { transform: translateY(-5px); }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .yt-aspect { padding-bottom: 56.25%; height: 0; }
        .ig-aspect { padding-bottom: 160%; height: 0; background: #fff; }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        .status-tag {
            background: var(--silk-red);
            color: white;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 0.75rem;
        }

        .label-red { color: var(--silk-red); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .label-value { color: var(--shelford-blue); font-weight: 700; font-size: 0.95rem; }

        .section-header {
            border-left: 4px solid var(--silk-red);
            padding-left: 1rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <header class="max-w-7xl mx-auto mb-20 flex flex-col md:flex-row justify-between items-end gap-6">
        <div>
            <h1 class="text-5xl md:text-7xl font-800 font-outfit tracking-tighter uppercase">
                Wei <span style="color: var(--silk-red)">Zih-Yun</span>
            </h1>
            <p class="text-base opacity-60 mt-3 font-medium">Mixing + Live Vocal + Playback Engineer ｜ Arranger ｜ Acoustic Guitarist</p>
        </div>
        <div class="text-right">
            <span class="text-xs font-bold tracking-[0.2em] uppercase opacity-40">MUSIC HIGHLIGHTS 2025-2026</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <section class="mb-20">
            <div class="section-header">
                <h2 class="font-outfit text-2xl font-800 uppercase tracking-tight">Featured Sessions</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="youtube-grid"></div>
        </section>

        <section>
            <div class="section-header">
                <h2 class="font-outfit text-2xl font-800 uppercase tracking-tight">Concerts & Live Mixing</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="instagram-grid"></div>
        </section>
    </main>

    <footer class="max-w-7xl mx-auto mt-32 py-10 border-t border-gray-200 text-center opacity-30 text-xs font-bold tracking-widest uppercase">
        &copy; <script>document.write(new Date().getFullYear())</script> WEI ZIH-YUN
    </footer>

    <!-- Essential Instagram Script -->
    <script async src="//www.instagram.com/embed.js"></script>

    <script>
        const YOUTUBE_PROJECTS = [
            { id: "yt1", type: "STUDIO", title: "GENBLUE - “Merry & Happy (TWICE)” Cover", role: "Recording Engineer", artist: "GENBLUE(젠블루)", venue: "TEN ENTERTAINMENT", videoId: "V4nQFpTLCiE" },
            { id: "yt2", type: "CONCERT", title: "KARD 2026 WORLD TOUR [DRIFT] IN TAIPEI", role: "Live Vocal Engineer", artist: "KARD", venue: "TICC @TAIPEI", videoId: "NdjqToNwg_E" },
            { id: "yt3", type: "LIVE EVENT", title: "'SPOT' (Cover by 畢書盡Bii & GENBLUE)", role: "Re-Arrangement / Recording & Mixing Engineer", artist: "畢書盡Bii / GENBLUE", venue: "Taipei New Year's Eve Party 2026", videoId: "ZXt3r6oaACw" }
        ];

        const INSTAGRAM_PROJECTS = [
            { id: "ig1", type: "CONCERT", title: "'我是真的很愛很愛你' (Original by YUAN of GENBLUE)", role: "Mixing Engineer / Acoustic Guitar Arrangement", artist: "YUAN of GENBLUE", venue: "Kaohsiung Music Center", videoId: "DVWABgaAdQo" },
            { id: "ig2", type: "CONCERT", title: "'STAR' (Cover by XXIN of GENBLUE)", role: "Mixing Engineer", artist: "XXIN of GENBLUE", venue: "Kaohsiung Music Center", videoId: "DVV_sqbgY86" },
            { id: "ig3", type: "CONCERT", title: "GENBLUE 'Color Paper' (Official Live Video)", role: "Mixing Engineer", artist: "GENBLUE(젠블루)", venue: "Kaohsiung Music Center", videoId: "DVOQ2pCiXH7" },
            { id: "ig4", type: "CONCERT", title: "'Poker Face' (Cover by LILI of GENBLUE)", role: "Mixing Engineer", artist: "LILI of GENBLUE", venue: "Kaohsiung Music Center", videoId: "DVWAXchgTld" },
            { id: "ig5", type: "CONCERT", title: "'Cruel Summer' (Cover by AYEON of GENBLUE)", role: "Mixing Engineer", artist: "AYEON of GENBLUE", venue: "Kaohsiung Music Center", videoId: "DVTacIoAeN_" },
            { id: "ig6", type: "CONCERT", title: "GENBLUE 'GIRL TALK' (Official Live Video)", role: "Mixing Engineer", artist: "GENBLUE(젠블루)", venue: "Kaohsiung Music Center", videoId: "DVJHN0NCSSy" },
            { id: "ig7", type: "CONCERT", title: "'Bet On Me' (Cover by AYAKO of GENBLUE)", role: "Mixing Engineer", artist: "AYAKO of GENBLUE", venue: "Kaohsiung Music Center", videoId: "DVTaY0QiU4F" },
            { id: "ig8", type: "CONCERT", title: "'You & Me' (Cover by NICO of GENBLUE)", role: "Mixing Engineer", artist: "NICO of GENBLUE", venue: "Kaohsiung Music Center", videoId: "DVTatGzAc3b" },
            { id: "ig9", type: "CONCERT", title: "GENBLUE '天空沒有極限' (Official Live Video)", role: "Mixing Engineer", artist: "GENBLUE(젠블루)", venue: "Kaohsiung Music Center", videoId: "DVLpWFwgX8W" },
        ];

        function createCard(project, platform) {
            const isYT = platform === 'youtube';
            
            // Fixed the YouTube URL syntax error
            const embedUrl = isYT 
                ? `https://www.youtube.com/embed/${project.videoId}?rel=0&modestbranding=1`
                : `https://www.instagram.com/p/${project.videoId}/embed/`;

            return `
                <div class="glass-card p-6 md:p-8">
                    <div class="video-wrapper ${isYT ? 'yt-aspect' : 'ig-aspect'}">
                        <iframe 
                            src="${embedUrl}" 
                            class="instagram-media"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>

                    <div class="flex-grow">
                        <span class="status-tag">${project.type}</span>
                        <h3 class="text-xl font-800 font-outfit leading-tight mb-1">${project.title}</h3>
                        <p class="text-sm opacity-60 font-medium mb-6">${project.role}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-6 border-t border-gray-100">
                        <div>
                            <p class="label-red">Artist</p>
                            <p class="label-value">${project.artist}</p>
                        </div>
                        <div>
                            <p class="label-red">Location / Venue</p>
                            <p class="label-value">${project.venue}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            document.getElementById('youtube-grid').innerHTML = 
                YOUTUBE_PROJECTS.map(p => createCard(p, 'youtube')).join('');
            
            document.getElementById('instagram-grid').innerHTML = 
                INSTAGRAM_PROJECTS.map(p => createCard(p, 'instagram')).join('');

            // Force Instagram script to process dynamic iframes
            if (window.instgrm) {
                window.instgrm.Embeds.process();
            }
        }

        window.addEventListener('DOMContentLoaded', renderAll);
    </script>
</body>
</html>

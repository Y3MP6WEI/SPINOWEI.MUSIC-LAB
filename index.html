    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --shelford-blue: #1D2B44;
            --silk-red: #C8102E;
            --candy-bg: #f4f7f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--candy-bg);
            color: var(--shelford-blue);
            min-height: 100vh;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }

        /* Neve Design - Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(29, 43, 68, 0.05);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.3s ease;
        }

        .glass-card:hover { transform: translateY(-5px); }

        /* Video Containers */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        /* YouTube: 16:9 */
        .yt-aspect { padding-bottom: 56.25%; height: 0; }
        
        /* Instagram: Taller aspect to prevent scrollbars/twisted look */
        .ig-aspect { padding-bottom: 125%; height: 0; }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Custom Play Overlay */
        .play-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .play-button-circle {
            width: 60px;
            height: 60px;
            background: var(--silk-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(200, 16, 46, 0.3);
        }

        .play-button-circle svg { fill: white; width: 22px; height: 22px; margin-left: 4px; }

        /* Labels & Status Tags */
        .status-tag {
            background: var(--silk-red);
            color: white;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 0.75rem;
        }

        .label-red { color: var(--silk-red); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .label-value { color: var(--shelford-blue); font-weight: 700; font-size: 0.95rem; }

        /* Section Dividers */
        .section-header {
            border-left: 4px solid var(--silk-red);
            padding-left: 1rem;
            margin-bottom: 2rem;
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEI ZIH-YUN | Music Producer Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --shelford-blue: #1D2B44;
            --silk-red: #C8102E;
            --candy-bg: #f4f7f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--candy-bg);
            color: var(--shelford-blue);
            min-height: 100vh;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }

        /* Glassmorphism Neve Design */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(29, 43, 68, 0.05);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
        }

        /* Aspect Ratio Logic */
        .yt-aspect { padding-bottom: 56.25%; height: 0; margin-bottom: 1rem; }
        
        /* Height adjustment for the tall IG block */
        .ig-aspect { flex-grow: 1; height: 100%; min-height: 500px; margin-bottom: 1rem; }
        .ig-aspect iframe { width: 100% !important; height: 100% !important; border: 0; position: absolute; top: 0; left: 0;}

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Play Overlay */
        .play-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .play-button-circle {
            width: 60px;
            height: 60px;
            background: var(--silk-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(200, 16, 46, 0.3);
        }

        .play-button-circle svg { fill: white; width: 22px; height: 22px; margin-left: 4px; }

        /* Typography & Labels */
        .status-tag {
            background: var(--silk-red);
            color: white;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .label-red { color: var(--silk-red); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
        .label-value { color: var(--shelford-blue); font-weight: 700; font-size: 0.85rem; line-height: 1.2; }

        /* Responsive Grid Logic */
        .top-feature-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 1024px) {
            .top-feature-grid {
                grid-template-columns: 450px 1fr; /* Set fixed width for YT column */
            }
            .yt-stack {
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <header class="max-w-7xl mx-auto mb-16 flex flex-col md:flex-row justify-between items-end gap-6">
        <div>
            <h1 class="text-4xl md:text-6xl font-800 font-outfit tracking-tighter uppercase">
                Wei <span style="color: var(--silk-red)">Zih-Yun</span>
            </h1>
            <p class="text-base opacity-60 mt-2 font-medium">Mixing + Live Vocal + Playback Engineer ｜ Arranger ｜ Acoustic Guitarist</p>
        </div>
        <div class="flex gap-4">
            <div class="h-[2px] w-12 bg-[#C8102E] self-center opacity-30"></div>
            <span class="text-xs font-bold tracking-[0.2em] uppercase opacity-40">Selected Works 24/25</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <!-- TOP FEATURED SECTION -->
        <div class="top-feature-grid mb-12">
            <!-- Left Side: 2 Stacked YouTube Cards -->
            <div class="yt-stack" id="yt-stack-container"></div>
            <!-- Right Side: 1 Tall Instagram Card -->
            <div id="ig-featured-container"></div>
        </div>

        <!-- REMAINING GRID (Remaining 1 YT and 11 IG) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="standard-grid"></div>
    </main>

    <!-- Essential Scripts -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- Official Instagram Script for handshaking -->
    <script async src="//www.instagram.com/embed.js"></script>

    <script>
        const MY_PROJECTS = [
            // 3 YouTube total
            { id: "yt1", platform: "youtube", type: "STUDIO", title: "GENBLUE - “Merry & Happy” Cover", role: "Recording Engineer", artist: "GENBLUE(젠블루)", venue: "TEN ENTERTAINMENT", videoId: "V4nQFpTLCiE" },
            { id: "yt2", platform: "youtube", type: "STUDIO", title: "Modern Solitude", role: "Lead Producer", artist: "Zih-Yun Solo", venue: "Private Facility", videoId: "9bZkp7q19f0" },
            { id: "yt3", platform: "youtube", type: "LIVE", title: "Cyberpunk Tour", role: "Technical Director", artist: "Aesthete 2077", venue: "Global Venues", videoId: "L_jWHffIx5E" },
            
            // 12 Instagram total
            { id: "ig1", platform: "instagram", type: "LIVE MIXING", title: "GENBLUE - Color Paper", role: "Mixing / Vocal Recording", artist: "GENBLUE(젠블루)", venue: "Kaohsiung Music Center", videoId: "DVOQ2pCiXH7" },
            { id: "ig2", platform: "instagram", type: "STUDIO", title: "Guitar Session #01", role: "Acoustic Guitarist", artist: "Wei Zih-Yun", venue: "Home Studio", videoId: "C1-60N_h9T3" },
            { id: "ig3", platform: "instagram", type: "STUDIO", title: "Mixing Workflow", role: "Engineer", artist: "Various Artists", venue: "Studio A", videoId: "C68qS-vug7f" },
            { id: "ig4", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" },
            { id: "ig5", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" },
            { id: "ig6", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" },
            { id: "ig7", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" },
            { id: "ig8", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" },
            { id: "ig9", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" },
            { id: "ig10", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" },
            { id: "ig11", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" },
            { id: "ig12", platform: "instagram", type: "LIVE", title: "Arena Soundcheck", role: "Playback Engineer", artist: "The Velvet", venue: "TMC", videoId: "C1-60N_h9T3" }
        ];

        const players = {};

        function createCard(project, tallMode = false) {
            const isYT = project.platform === 'youtube';
            // Use /p/ instead of /reels/ for maximum embed stability
            const igUrl = `https://www.instagram.com/p/${project.videoId}/embed/`;

            return `
                <div class="glass-card p-6">
                    <div class="video-wrapper ${isYT ? 'yt-aspect' : 'ig-aspect'}">
                        <div class="play-overlay" id="overlay-${project.id}" onclick="handlePlay('${project.id}', '${project.platform}')">
                            <div class="play-button-circle">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                        ${isYT 
                            ? `<div id="player-${project.id}"></div>`
                            : `<iframe id="player-${project.id}" src="${igUrl}" allowtransparency="true" frameborder="0" scrolling="no"></iframe>`
                        }
                    </div>
                    <div class="flex-grow">
                        <span class="status-tag">${project.type}</span>
                        <h3 class="text-xl font-800 font-outfit leading-tight mb-1">${project.title}</h3>
                        <p class="text-xs opacity-60 font-medium mb-4">${project.role}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-gray-100">
                        <div>
                            <p class="label-red">Artist</p>
                            <p class="label-value">${project.artist}</p>
                        </div>
                        <div>
                            <p class="label-red">Location / Venue</p>
                            <p class="label-value">${project.venue}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            document.getElementById('yt-stack-container').innerHTML = createCard(MY_PROJECTS[0]) + createCard(MY_PROJECTS[1]);
            document.getElementById('ig-featured-container').innerHTML = createCard(MY_PROJECTS[3]);
            
            const remaining = [MY_PROJECTS[2], ...MY_PROJECTS.slice(4)];
            document.getElementById('standard-grid').innerHTML = remaining.map(p => createCard(p)).join('');
        }

        function onYouTubeIframeAPIReady() {
            MY_PROJECTS.forEach(project => {
                if(project.platform === 'youtube') {
                    players[project.id] = new YT.Player(`player-${project.id}`, {
                        videoId: project.videoId,
                        playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0 }
                    });
                }
            });
        }

        function handlePlay(id, platform) {
            document.getElementById(`overlay-${id}`).style.display = 'none';
            if (platform === 'youtube' && players[id]) {
                players[id].playVideo();
            }
            // For Instagram: The red overlay hides, revealing the Instagram play button.
        }

        window.addEventListener('DOMContentLoaded', renderAll);
    </script>
</body>
</html>
